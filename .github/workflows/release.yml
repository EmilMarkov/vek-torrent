name: Release

# Сборка артефактов под все платформы и публикация релиза с автоматически
# сгенерированным описанием изменений при пуше тега вида v1.2.3.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Создать черновик релиза
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Создать релиз с changelog
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;

            // Автогенерация описания изменений из истории коммитов/PR.
            let body = 'Автоматически сгенерированный релиз.';
            try {
              const notes = await github.rest.repos.generateReleaseNotes({ owner, repo, tag_name: tag });
              body = notes.data.body;
            } catch (error) {
              core.warning(`Не удалось сгенерировать changelog: ${error}`);
            }

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `VEK Torrent ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', release.data.id);

  build:
    name: Сборка (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Apple Silicon)
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            label: macOS (Intel)
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            label: Linux
            target: ""
            args: ""
          - platform: windows-latest
            label: Windows
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Установка Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установка Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Системные зависимости (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libxdo-dev libssl-dev \
            build-essential curl wget file patchelf

      - name: Установка зависимостей фронтенда
        run: npm ci

      - name: Сборка и загрузка артефактов
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Подпись артефактов автообновления (tauri-plugin-updater):
          # приватный ключ хранится только в секретах репозитория.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          # latest.json для встроенного автообновления (endpoint updater'а).
          includeUpdaterJson: true

  publish-release:
    name: Опубликовать релиз
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Снять черновик
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
